<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kim Chi - Thế Giới Kỳ Thú</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');

        :root {
            --glass-bg: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.4);
            --accent-blue: #4facfe;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100dvh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
            display: flex;
            flex-direction: column;
            color: white;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid var(--glass-border);
            border-radius: 24px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid rgba(255, 255, 255, 1);
            border-radius: 18px;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .glass-card.selected {
            background: #ffffff;
            border-color: #ffd700;
            transform: scale(1.1);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
        }

        .animal-sprite {
            font-size: clamp(2.5rem, 7vh, 4rem);
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
            line-height: 1;
            display: inline-block;
        }

        .click-ripple {
            position: absolute;
            border: 2px solid white;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            animation: ripple-effect 0.4s ease-out forwards;
            z-index: 100;
        }
        @keyframes ripple-effect {
            0% { width: 0; height: 0; opacity: 1; }
            100% { width: 100px; height: 100px; opacity: 0; }
        }

        .star-particle {
            position: absolute;
            pointer-events: none;
            z-index: 150;
            animation: star-burst 0.8s ease-out forwards;
        }
        @keyframes star-burst {
            0% { transform: translate(0, 0) scale(0); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(var(--s)) rotate(var(--r)); opacity: 0; }
        }

        .hidden-screen { display: none !important; }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        .game-grid-container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            width: 100%;
            padding: 5px 0;
        }

        /* Chỉnh khung bóng nhỏ lại */
        .shadow-slot {
            aspect-ratio: 1/1;
            background: rgba(0, 0, 0, 0.45);
            border: 3px dashed rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 140px; /* Giới hạn chiều rộng khung */
            margin: 0 auto;
        }

        .habitat-zone {
            flex: 1;
            border-radius: 24px;
            display: flex;
            flex-wrap: wrap;
            align-content: center;
            justify-content: center;
            gap: 12px;
            padding: 20px;
            position: relative;
            border-width: 4px;
            min-height: 140px;
            transition: all 0.3s;
        }

        .habitat-zone.land {
            background: rgba(34, 197, 94, 0.3);
            border-color: rgba(34, 197, 94, 0.6);
        }

        .habitat-zone.water {
            background: rgba(59, 130, 246, 0.3);
            border-color: rgba(59, 130, 246, 0.6);
        }

        .particle {
            position: absolute;
            pointer-events: none;
            animation: fall linear infinite;
        }
        @keyframes fall {
            from { transform: translateY(-10vh) rotate(0); opacity: 0; }
            20% { opacity: 0.5; }
            to { transform: translateY(80vh) rotate(360deg); opacity: 0; }
        }
        
        .animal-option {
            color: black;
            text-shadow: none;
        }
    </style>
</head>
<body>

    <div id="game-container" class="w-full h-full flex flex-col max-w-lg mx-auto overflow-hidden">
        
        <!-- MENU CHÍNH -->
        <div id="main-menu" class="h-full flex flex-col items-center justify-center p-6 animate__animated animate__fadeIn">
            <div class="glass-panel p-8 w-full text-center space-y-8 shadow-2xl">
                <div>
                    <h1 class="text-6xl font-black italic text-white tracking-tighter drop-shadow-2xl uppercase">KIM CHI</h1>
                    <p class="text-blue-100 uppercase tracking-[0.2em] text-[11px] font-bold mt-2">Cùng bé khám phá thế giới</p>
                </div>
                
                <div class="space-y-4">
                    <button onclick="startGame('shadow')" class="glass-card w-full p-6 flex items-center gap-5 active:scale-95 !bg-white/20 !border-white/40">
                        <span class="text-5xl">🔍</span>
                        <div class="text-left text-white">
                            <div class="font-black text-lg uppercase leading-none">Thám Tử</div>
                            <div class="text-[10px] mt-1 opacity-80">Tìm bóng các bạn nhỏ</div>
                        </div>
                    </button>
                    <button onclick="startGame('count')" class="glass-card w-full p-6 flex items-center gap-5 active:scale-95 !bg-white/20 !border-white/40">
                        <span class="text-5xl">🔢</span>
                        <div class="text-left text-white">
                            <div class="font-black text-lg uppercase leading-none">Đếm Sao</div>
                            <div class="text-[10px] mt-1 opacity-80">Học đếm thật vui nhộn</div>
                        </div>
                    </button>
                    <button onclick="startGame('sort')" class="glass-card w-full p-6 flex items-center gap-5 active:scale-95 !bg-white/20 !border-white/40">
                        <span class="text-5xl">🏡</span>
                        <div class="text-left text-white">
                            <div class="font-black text-lg uppercase leading-none">Về Nhà</div>
                            <div class="text-[10px] mt-1 opacity-80">Sắp xếp nơi ở cho bạn nhỏ</div>
                        </div>
                    </button>
                </div>
            </div>
        </div>

        <!-- MÀN CHƠI -->
        <div id="game-play" class="hidden-screen h-full flex flex-col p-4 animate__animated animate__fadeIn">
            <header class="flex justify-between items-center mb-4 px-2">
                <button onclick="backToMenu()" class="glass-card w-12 h-12 text-2xl flex items-center justify-center shadow-lg !bg-white/30">🏠</button>
                <div class="flex gap-2">
                    <div class="glass-panel px-4 py-2 text-xs font-black tracking-widest">CẤP <span id="level-display">1</span></div>
                    <div class="glass-panel px-4 py-2 text-xs font-black text-yellow-300">⭐ <span id="score-display">0</span></div>
                </div>
            </header>

            <div id="game-content" class="flex-grow flex flex-col items-center w-full overflow-hidden"></div>
        </div>

        <!-- MODAL CHIẾN THẮNG -->
        <div id="success-modal" class="hidden-screen absolute inset-0 z-[200] flex items-center justify-center bg-blue-900/80 backdrop-blur-xl p-8">
            <div class="glass-panel p-10 text-center animate__animated animate__zoomInDown w-full">
                <div class="text-8xl mb-4 animate__animated animate__tada animate__infinite">✨</div>
                <h2 class="text-4xl font-black mb-2 italic">GIỎI QUÁ!</h2>
                <p class="text-blue-100 mb-8 font-bold text-sm uppercase tracking-widest">Bé đã hoàn thành thử thách</p>
                <button id="next-btn" class="w-full py-5 text-xl font-black uppercase bg-white text-blue-900 rounded-3xl shadow-2xl active:scale-95 transition-transform">TIẾP TỤC ➔</button>
            </div>
        </div>
    </div>

    <script>
        const ALL_ANIMALS = [
            { id: 'lion', emoji: '🦁', habitat: 'land', particles: ['🍃', '🐾'] },
            { id: 'tiger', emoji: '🐯', habitat: 'land', particles: ['🍃', '🐯'] },
            { id: 'monkey', emoji: '🐒', habitat: 'land', particles: ['🍌', '🍃'] },
            { id: 'giraffe', emoji: '🦒', habitat: 'land', particles: ['🦒', '🍃'] },
            { id: 'elephant', emoji: '🐘', habitat: 'land', particles: ['🐘', '💧'] },
            { id: 'rabbit', emoji: '🐰', habitat: 'land', particles: ['🥕', '🌸'] },
            { id: 'bee', emoji: '🐝', habitat: 'land', particles: ['🐝', '🍯'] },
            { id: 'whale', emoji: '🐋', habitat: 'water', particles: ['🫧', '🐳'] },
            { id: 'shark', emoji: '🦈', habitat: 'water', particles: ['🫧', '🦈'] },
            { id: 'dolphin', emoji: '🐬', habitat: 'water', particles: ['🫧', '🐬'] },
            { id: 'crab', emoji: '🦀', habitat: 'water', particles: ['🦀', '🐚'] },
            { id: 'fish', emoji: '🐠', habitat: 'water', particles: ['🐠', '🫧'] },
            { id: 'octopus', emoji: '🐙', habitat: 'water', particles: ['🐙', '🐚'] },
            { id: 'turtle', emoji: '🐢', habitat: 'water', particles: ['🐢', '🫧'] }
        ];

        let state = { game: null, level: 1, score: 0, activeId: null, audio: null, matchedCount: 0, totalToMatch: 0 };

        const playSfx = (type) => {
            try {
                if (!state.audio) state.audio = new (window.AudioContext || window.webkitAudioContext)();
                const ctx = state.audio;
                const g = ctx.createGain(); g.connect(ctx.destination);
                if (type === 'correct') {
                    g.gain.setValueAtTime(0.1, ctx.currentTime);
                    const o = ctx.createOscillator(); o.frequency.setValueAtTime(523.25, ctx.currentTime);
                    o.frequency.exponentialRampToValueAtTime(1046.50, ctx.currentTime + 0.15);
                    o.connect(g); o.start(); o.stop(ctx.currentTime + 0.2);
                } else if (type === 'pop') {
                    g.gain.setValueAtTime(0.05, ctx.currentTime);
                    const o = ctx.createOscillator(); o.frequency.setValueAtTime(600, ctx.currentTime);
                    o.connect(g); o.start(); o.stop(ctx.currentTime + 0.1);
                } else {
                    g.gain.setValueAtTime(0.05, ctx.currentTime);
                    const o = ctx.createOscillator(); o.type = 'square'; o.frequency.setValueAtTime(150, ctx.currentTime);
                    o.connect(g); o.start(); o.stop(ctx.currentTime + 0.2);
                }
            } catch(e){}
        };

        function startGame(type) {
            state.game = type; state.level = 1; state.score = 0;
            document.getElementById('main-menu').classList.add('hidden-screen');
            document.getElementById('game-play').classList.remove('hidden-screen');
            loadLevel();
        }

        function backToMenu() {
            document.getElementById('main-menu').classList.remove('hidden-screen');
            document.getElementById('game-play').classList.add('hidden-screen');
            document.getElementById('success-modal').classList.add('hidden-screen');
        }

        function loadLevel() {
            document.getElementById('level-display').innerText = state.level;
            document.getElementById('score-display').innerText = state.score;
            document.getElementById('success-modal').classList.add('hidden-screen');
            const container = document.getElementById('game-content');
            container.innerHTML = ''; 
            state.activeId = null; state.matchedCount = 0;
            
            const layout = document.createElement('div');
            layout.className = "game-grid-container";
            container.appendChild(layout);

            if (state.game === 'shadow') initShadow(layout);
            else if (state.game === 'count') initCount(layout);
            else if (state.game === 'sort') initSort(layout);
        }

        function createStarBurstAt(x, y) {
            const colors = ['#FFD700', '#FF69B4', '#00FF7F', '#00BFFF', '#FFFFFF'];
            for(let i = 0; i < 20; i++) {
                const star = document.createElement('div');
                star.className = 'star-particle';
                star.innerText = '⭐';
                star.style.left = x + 'px'; star.style.top = y + 'px';
                star.style.color = colors[Math.floor(Math.random() * colors.length)];
                star.style.fontSize = (Math.random() * 20 + 20) + 'px';
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 150 + 80;
                star.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
                star.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
                star.style.setProperty('--r', `${Math.random() * 360}deg`);
                star.style.setProperty('--s', `${Math.random() * 1.5 + 0.5}`);
                document.body.appendChild(star);
                setTimeout(() => star.remove(), 1000);
            }
        }

        function initShadow(parent) {
            const count = 4; state.totalToMatch = count;
            const animals = ALL_ANIMALS.sort(() => 0.5 - Math.random()).slice(0, count);
            const options = [...animals].sort(() => 0.5 - Math.random());

            const grid = document.createElement('div');
            grid.className = "grid grid-cols-2 gap-4 w-full px-6 mt-4 flex-grow items-center justify-center";
            
            animals.forEach(a => {
                const slot = document.createElement('div');
                slot.className = "shadow-slot";
                slot.innerHTML = `<span class="animal-sprite" style="filter: brightness(0) opacity(0.6); transform: scale(0.85);">${a.emoji}</span>`;
                slot.onclick = (e) => {
                    if (state.activeId === a.id && !slot.classList.contains('matched')) {
                        slot.classList.add('matched');
                        slot.innerHTML = `<span class="animal-sprite animate__animated animate__bounceIn" style="filter: none; transform: scale(1.1);">${a.emoji}</span>`;
                        createStarBurstAt(e.clientX, e.clientY);
                        playSfx('correct'); state.score += 20; state.matchedCount++;
                        
                        const selectedInPool = document.querySelector(`[data-id="${a.id}"]`);
                        if(selectedInPool) {
                            selectedInPool.style.opacity = '0.3';
                            selectedInPool.classList.remove('selected');
                        }
                        
                        state.activeId = null;
                        if(state.matchedCount === state.totalToMatch) setTimeout(finishLevel, 1000);
                    } else if(state.activeId) {
                        playSfx('wrong'); slot.classList.add('shake'); setTimeout(() => slot.classList.remove('shake'), 400);
                    }
                };
                grid.appendChild(slot);
            });

            const pool = document.createElement('div');
            pool.className = "grid grid-cols-4 gap-4 w-full p-5 glass-panel mb-4 mx-2 shadow-xl !bg-white/10";
            options.forEach(a => {
                const card = document.createElement('div');
                card.className = "glass-card aspect-square text-5xl";
                card.dataset.id = a.id; 
                card.innerHTML = `<span class="animal-option">${a.emoji}</span>`;
                card.onclick = () => {
                    if (card.style.opacity === '0.3') return;
                    playSfx('pop'); 
                    document.querySelectorAll('.glass-card').forEach(c => c.classList.remove('selected'));
                    state.activeId = a.id; 
                    card.classList.add('selected');
                };
                pool.appendChild(card);
            });
            parent.appendChild(grid); parent.appendChild(pool);
        }

        function initCount(parent) {
            const count = Math.floor(Math.random() * 5) + 3;
            const animal = ALL_ANIMALS[Math.floor(Math.random() * ALL_ANIMALS.length)];
            
            const board = document.createElement('div');
            board.className = "glass-panel w-full flex-grow relative flex flex-wrap justify-center items-center gap-6 p-10 mb-6 overflow-hidden mx-auto max-w-[95%] shadow-xl";
            
            for(let i=0; i<15; i++) {
                const p = document.createElement('span');
                p.className = 'particle'; p.innerText = animal.particles[i%2];
                p.style.left = Math.random() * 95 + '%';
                p.style.fontSize = '28px'; p.style.animationDuration = (Math.random()*4+4)+'s';
                board.appendChild(p);
            }

            for(let i=0; i<count; i++){
                const a = document.createElement('div');
                a.className = "animal-sprite cursor-pointer p-2 hover:scale-110 transition-transform"; a.innerText = animal.emoji;
                a.onclick = () => { playSfx('pop'); a.classList.toggle('animate__pulse'); setTimeout(()=>a.classList.remove('animate__pulse'), 500); };
                board.appendChild(a);
            }

            const answers = document.createElement('div');
            answers.className = "grid grid-cols-3 gap-5 w-full px-4 mb-6";
            let nums = [count-1, count, count+1].sort(()=>0.5-Math.random());
            nums.forEach(n => {
                if(n < 1) n = count + 2;
                const b = document.createElement('button');
                b.className = "glass-panel py-6 text-5xl font-black shadow-2xl active:scale-90 transition-transform !bg-white/90 !text-blue-900"; b.innerText = n;
                b.onclick = (e) => {
                    if(n === count) { createStarBurstAt(e.clientX, e.clientY); playSfx('correct'); state.score += 25; setTimeout(finishLevel, 1200); }
                    else { playSfx('wrong'); b.classList.add('shake'); setTimeout(()=>b.classList.remove('shake'), 400); }
                };
                answers.appendChild(b);
            });
            parent.appendChild(board); parent.appendChild(answers);
        }

        function initSort(parent) {
            const count = 4; state.totalToMatch = count;
            const animals = ALL_ANIMALS.sort(()=>0.5-Math.random()).slice(0, count);
            
            const habitatContainer = document.createElement('div');
            habitatContainer.className = "flex flex-col gap-5 w-full px-3 flex-grow mt-2";
            
            const land = document.createElement('div');
            land.className = "habitat-zone land";
            land.dataset.type = 'land'; land.innerHTML = `<span class="absolute top-2 left-4 text-xs font-black tracking-widest text-white drop-shadow-md">🏡 TRÊN CẠN</span>`;
            
            const water = document.createElement('div');
            water.className = "habitat-zone water";
            water.dataset.type = 'water'; water.innerHTML = `<span class="absolute top-2 left-4 text-xs font-black tracking-widest text-white drop-shadow-md">🌊 DƯỚI NƯỚC</span>`;

            [land, water].forEach(zone => {
                zone.onclick = (e) => {
                    if (state.activeId) {
                        const a = ALL_ANIMALS.find(i => i.id === state.activeId);
                        if (a.habitat === zone.dataset.type) {
                            createStarBurstAt(e.clientX, e.clientY); playSfx('correct'); state.score += 20; state.matchedCount++;
                            
                            const selectedInPool = document.querySelector(`[data-id="${state.activeId}"]`);
                            if(selectedInPool) selectedInPool.style.visibility = 'hidden';
                            
                            const m = document.createElement('div'); 
                            m.className = "text-6xl animate__animated animate__bounceIn drop-shadow-lg"; 
                            m.innerText = a.emoji;
                            zone.appendChild(m); state.activeId = null;
                            if(state.matchedCount === state.totalToMatch) setTimeout(finishLevel, 1000);
                        } else {
                            playSfx('wrong'); zone.classList.add('shake'); setTimeout(() => zone.classList.remove('shake'), 400);
                        }
                    }
                };
            });

            const pool = document.createElement('div');
            pool.className = "grid grid-cols-4 gap-4 w-full p-5 glass-panel mb-4 mx-2 shadow-xl !bg-white/10";
            animals.forEach(a => {
                const card = document.createElement('div');
                card.className = "glass-card aspect-square text-5xl";
                card.dataset.id = a.id; 
                card.innerHTML = `<span class="animal-option">${a.emoji}</span>`;
                card.onclick = () => {
                    playSfx('pop'); 
                    document.querySelectorAll('.glass-card').forEach(c => c.classList.remove('selected'));
                    state.activeId = a.id; card.classList.add('selected');
                };
                pool.appendChild(card);
            });

            habitatContainer.appendChild(land); habitatContainer.appendChild(water);
            parent.appendChild(habitatContainer); parent.appendChild(pool);
        }

        function finishLevel() {
            document.getElementById('success-modal').classList.remove('hidden-screen');
            document.getElementById('next-btn').onclick = () => {
                if(state.level < 10) { state.level++; loadLevel(); }
                else { startGame(state.game); }
            };
        }

        window.addEventListener('mousedown', (e) => {
            const r = document.createElement('div'); r.className = 'click-ripple';
            r.style.left = e.clientX + 'px'; r.style.top = e.clientY + 'px';
            document.body.appendChild(r); setTimeout(() => r.remove(), 400);
        });
    </script>
</body>
</html>
